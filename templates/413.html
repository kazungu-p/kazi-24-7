<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>413 Request Entity Too Large</title>
  <!-- Google Fonts -->
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f8f9fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      color: #343a40;
      text-align: center;
      padding: 2rem;
    }
    .error-container {
      background: #ffffff;
      padding: 3rem 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      max-width: 600px;
      width: 100%;
    }
    h1 {
      font-size: 4rem;
      margin-bottom: 1rem;
      color: #dc3545; /* Bootstrap danger red */
      display: inline-block;
      animation: pulse 2s infinite;
    }
    h2 {
      font-size: 1.75rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    p {
      font-size: 1rem;
      color: #6c757d;
      margin-bottom: 2rem;
    }
    .btn-home {
      background: #0d6efd;
      color: #fff;
      font-weight: 600;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-home:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(13, 110, 253, 0.4);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .error-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: inline-block;
    }

    @media (max-width: 576px) {
      h1 { font-size: 3rem; }
      h2 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon">⚠️</div>
    <h1>413</h1>
    <h2>Request Entity Too Large</h2>
    <p>Oops! The file or data you tried to send is too large for the server to handle. Please try with a smaller file or reduce the content size.</p>
    <a href="{{ url_for('index') }}" class="btn-home">Go Back Home</a>
  </div>
</body>
</html>
