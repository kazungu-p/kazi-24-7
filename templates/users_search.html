{% extends "base.html" %}
{% block content %}
<h2>Search Users</h2>
<input type="text" id="search-input" placeholder="Search by name or email..." class="form-control mb-3">

<div id="users-container">
  <!-- Results appear here -->
</div>

<script>
async function fetchUsers(query='') {
    const res = await fetch(`/users/search?q=${encodeURIComponent(query)}`);
    const data = await res.json();
    const container = document.getElementById('users-container');
    container.innerHTML = '';
    if(data.length === 0){
        container.innerHTML = '<p>No users found.</p>';
        return;
    }
    data.forEach(user => {
        const card = document.createElement('div');
        card.className = 'card mb-2 p-2';
        card.innerHTML = `
            <div class="d-flex align-items-center">
                <img src="${user.profile_picture ? '/uploads/' + user.profile_picture : '/static/default_avatar.png'}" 
                     alt="avatar" width="60" height="60" class="rounded-circle me-3">
                <div>
                    <h5>${user.username}</h5>
                    <p>Job: ${user.job_title}</p>
                    <a href="/profile/${user.id}" class="btn btn-sm btn-primary me-2">View Profile</a>
                    ${user.job_id ? `<form method="POST" action="/apply/${user.job_id}" style="display:inline;">
                        <button class="btn btn-sm btn-success">Apply</button>
                    </form>` : ''}
                    <a href="/messages/${user.id}" class="btn btn-sm btn-warning">Message</a>
                </div>
            </div>
        `;
        container.appendChild(card);
    });
}

// Event listener for search
document.getElementById('search-input').addEventListener('input', e => {
    fetchUsers(e.target.value);
});

// Load all users initially
fetchUsers();
</script>
{% endblock %}
