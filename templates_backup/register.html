{% extends 'base.html' %}
{% block title %}Register — KaziConnect{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="mb-3">Create an account</h4>
        <form method="post" enctype="multipart/form-data">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-2">
            <label class="form-label">Username (optional)</label>
            <input class="form-control" name="username" placeholder="username">
          </div>
          <div class="mb-2">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" name="email" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" name="password" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Phone number</label>
            <input class="form-control" name="phone_number">
          </div>
          <div class="mb-2">
            <label class="form-label">National ID</label>
            <input class="form-control" name="national_id">
          </div>
          <div class="mb-2">
            <label class="form-label">Location</label>
            <input class="form-control" name="location">
          </div>
          <div class="mb-2">
            <label class="form-label">Work type</label>
            <input class="form-control" name="work_type">
          </div>
          <div class="mb-3">
            <label class="form-label">Certificate (pdf/png/jpg)</label>
            <input class="form-control" name="certificate" type="file" accept=".pdf,.png,.jpg,.jpeg">
          </div>

          <div class="d-grid">
            <button class="btn btn-primary">Register</button>
          </div>

          <div class="mt-3 small text-muted">
            Already have an account? <a href="{{ url_for('login') }}">Login</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
