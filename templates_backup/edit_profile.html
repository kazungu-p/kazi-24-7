{% extends 'base.html' %}
{% block title %}Edit Profile — KaziConnect{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="mb-3">Edit Profile</h4>
        <form method="post" enctype="multipart/form-data">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-2">
            <label class="form-label">Username</label>
            <input class="form-control" name="username" value="{{ current_user.username }}">
          </div>

          <div class="mb-2">
            <label class="form-label">Phone number</label>
            <input class="form-control" name="phone_number" value="{{ current_user.phone_number }}">
          </div>

          <div class="mb-2">
            <label class="form-label">Location</label>
            <input class="form-control" name="location" value="{{ current_user.location }}">
          </div>

          <div class="mb-2">
            <label class="form-label">Work type</label>
            <input class="form-control" name="work_type" value="{{ current_user.work_type }}">
          </div>

          <div class="mb-3">
            <label class="form-label">Profile picture (png/jpg/jpeg)</label>
            <input class="form-control" name="profile_picture" type="file" accept=".png,.jpg,.jpeg">
            {% if current_user.profile_picture %}
              <div class="mt-2">
                <img src="{{ url_for('uploaded_file', filename=current_user.profile_picture) }}" alt="Profile" class="rounded-circle" width="80">
              </div>
            {% endif %}
          </div>

          <div class="d-grid">
            <button class="btn btn-primary">Save changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
