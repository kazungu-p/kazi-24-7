{% extends "base.html" %}

{% block title %}Page Not Found - Job Platform{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="error-template">
                <h1 class="display-1 text-primary">404</h1>
                <h2>Page Not Found</h2>
                <p class="lead">Sorry, the page you're looking for doesn't exist.</p>
                <div class="error-actions mt-4">
                    <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
                        <i class="fas fa-home"></i> Go to Homepage
                    </a>
                    {% if current_user.is_authenticated %}
                    <a href="{{ url_for('profile') }}" class="btn btn-outline-secondary btn-lg">
                        <i class="fas fa-user"></i> Go to Profile
                    </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.error-template {
    padding: 40px 15px;
}
.error-template h1 {
    font-size: 10rem;
    font-weight: bold;
}
</style>
{% endblock %}
