<!DOCTYPE html>
<html>
<head>
    <title>Debug View - No CSS/JS</title>
</head>
<body>
    <h1>Debug: Raw Jobs Display</h1>
    {% if jobs %}
        <h2>Found {{ jobs|length }} jobs:</h2>
        <ul>
        {% for job in jobs %}
            <li style="border: 2px solid black; padding: 10px; margin: 10px;">
                <strong>{{ job.title }}</strong><br>
                Location: {{ job.location }}<br>
                Posted: {{ job.created_at }}
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No jobs found</p>
    {% endif %}
</body>
</html>
